<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarBase Taplist</title>

    <style>
        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .beer {
            background: #222;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .beer h2 {
            margin: 0 0 5px 0;
        }

        .beer p {
            margin: 3px 0;
        }
    </style>
</head>
<body>

<h1>StarBase Brewing – Taplist</h1>

<div id="taplist">Loading…</div>

<script>
    // 👉 Replace this with YOUR Google Sheet ID
    const sheetID = "YOUR_SHEET_ID_HERE";

    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

    fetch(url)
        .then(res => res.text())
        .then(text => {
            const json = JSON.parse(text.substring(47, text.length - 2));
            const rows = json.table.rows;

            const container = document.getElementById("taplist");
            container.innerHTML = "";

            rows.forEach(row => {
                const name = row.c[0]?.v || "";
                const style = row.c[1]?.v || "";
                const abv = row.c[2]?.v || "";
                const notes = row.c[3]?.v || "";

                const div = document.createElement("div");
                div.className = "beer";

                div.innerHTML = `
                    <h2>${name}</h2>
                    <p><strong>Style:</strong> ${style}</p>
                    <p><strong>ABV:</strong> ${abv}</p>
                    <p><strong>Notes:</strong> ${notes}</p>
                `;

                container.appendChild(div);
            });
        })
        .catch(err => {
            document.getElementById("taplist").innerHTML = "Error loading taplist.";
            console.error(err);
        });
</script>

</body>
</html>
