<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StarBase Brewing Taplist</title>

<style>
  body {
    background: #111 url('space_station_background.jpg') no-repeat center center fixed;
    background-size: cover;
    color: #eee;
    font-family: Arial, Helvetica, sans-serif;
    margin: 40px;
  }

  h1 {
    text-align: center;
    font-size: 48px;
    letter-spacing: 4px;
    margin-bottom: 10px;
  }

  h2 {
    font-size: 32px;
    margin-top: 40px;
    border-bottom: 2px solid #f1c40f;
    padding-bottom: 10px;
    color: #f1c40f;
  }

  .beer {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 25px 0;
    opacity: 0;
    animation: fadeIn 1.2s forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .beer-icon {
    width: 60px;
    height: 60px;
    object-fit: contain;
  }

  .beer-name {
    font-size: 30px;
    font-weight: bold;
  }

  .beer-details {
    font-size: 22px;
    color: #bbb;
  }

  .beer-notes {
    font-size: 20px;
    color: #999;
    font-style: italic;
  }

  #timestamp {
    margin-top: 30px;
    font-size: 18px;
    color: #ccc;
    text-align: center;
  }

  #refreshIndicator {
    text-align: center;
    font-size: 16px;
    color: #f1c40f;
    opacity: 0;
    transition: opacity 0.5s;
  }
</style>
</head>

<body>

<h1>STARBASE BREWING</h1>

<h2>NOW POURING · AHORA SIRVIENDO</h2>
<div id="liveTaps"></div>

<h2>COMING SOON · PRÓXIMAMENTE</h2>
<div id="comingSoon"></div>

<div id="refreshIndicator">Refreshing…</div>
<div id="timestamp"></div>

<script>
const sheetID = "YOUR_SHEET_ID_HERE"; // <-- replace this
const liveURL = `https://opensheet.elk.sh/${sheetID}/LiveTaps`;
const soonURL = `https://opensheet.elk.sh/${sheetID}/ComingSoon`;

function updateTimestamp() {
  const now = new Date();
  document.getElementById("timestamp").innerText =
    "Last updated: " + now.toLocaleTimeString();
}

function showRefreshIndicator() {
  const indicator = document.getElementById("refreshIndicator");
  indicator.style.opacity = 1;
  setTimeout(() => indicator.style.opacity = 0, 2000);
}

function loadData() {
  showRefreshIndicator();

  fetch(liveURL)
    .then(r => r.json())
    .then(data => {
      const container = document.getElementById("liveTaps");
      container.innerHTML = "";
      data.forEach(row => {
        if (row.Status === "On Tap") {
          container.innerHTML += `
            <div class="beer">
              <img src="${row.IconURL}" class="beer-icon">
              <div>
                <div class="beer-name">${row.Tap}. ${row.BeerName}</div>
                <div class="beer-details">${row.Style} · ${row.ABV}%</div>
                <div class="beer-notes">Notes: ${row.Notes}</div>
              </div>
            </div>
          `;
        }
      });
    });

  fetch(soonURL)
    .then(r => r.json())
    .then(data => {
      const container = document.getElementById("comingSoon");
      container.innerHTML = "";
      data.forEach(row => {
        container.innerHTML += `
          <div class="beer">
            <img src="${row.IconURL}" class="beer-icon">
            <div>
              <div class="beer-name">${row.BeerName}</div>
              <div class="beer-details">${row.Style} · ${row.ABV}%</div>
              <div class="beer-notes">Notes: ${row.Notes}</div>
            </div>
          </div>
        `;
      });
    });

  updateTimestamp();
}

loadData();
setInterval(loadData, 300000); // 5 minutes
</script>

</body>
</html>
